<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="color-scheme" content="dark">
<!-- Build-version exposure (CLAUDE.md §6.7): %%APP_VERSION%% is a placeholder the resolver Lambda
     substitutes at serve time (on_dig_net_resolver::with_app_version) with its own compile-time
     Cargo.toml version. This page's CSP is script-src 'none' (deliberately inert), so only the meta
     tag + the visible text form apply here — no JS version global is set on this page. -->
<meta name="app-version" content="%%APP_VERSION%%">
<title>DIG domain — temporarily unavailable</title>
<style>
  /* DIG Network brand tokens (dark theme). All CSS inline + self-contained — no external fetch.
     Served verbatim (no subdomain substitution) for unknown / misconfigured hosts. */
  :root {
    --dig-purple: #7a3dff; --dig-purple-hover: #9466ff; --dig-magenta: #ff00de;
    --bg: #0b0a12; --surface: #16131f; --border: #2a2440;
    --text: #fff; --muted: #a99fc4; --faint: #7e769b;
    --shadow-pop: 0 24px 70px rgba(0,0,0,.6);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text); min-height: 100dvh;
    font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased; line-height: 1.55;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    background-image:
      radial-gradient(820px 560px at 50% 38%, rgba(122,61,255,.16), rgba(11,10,18,0) 62%),
      radial-gradient(520px 360px at 50% 38%, rgba(255,0,222,.06), rgba(11,10,18,0) 60%);
    background-repeat: no-repeat;
  }
  .card {
    position: relative; width: min(92vw, 460px);
    padding: 38px 36px 34px; border-radius: 18px;
    background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0)), var(--surface);
    border: 1px solid var(--border); box-shadow: var(--shadow-pop); overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; inset: 0 0 auto 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--dig-purple) 35%, var(--dig-magenta) 65%, transparent);
    opacity: .85;
  }
  .mark {
    font-size: 24px; font-weight: 700; letter-spacing: 1px; margin: 0 0 22px;
    background: linear-gradient(135deg, #9466ff, #ff00de);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  /* "Network" carries its OWN explicit fill so it never inherits the parent's color:transparent /
     clipped gradient (that rendered it the same color as the background — invisible). --muted
     (#a99fc4) on the #16131f card clears WCAG AA. */
  .mark .net { font-weight: 500; -webkit-text-fill-color: var(--muted); color: var(--muted); }
  .badge {
    display: inline-flex; align-items: center; gap: 7px; margin-bottom: 16px;
    font-size: 11px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase;
    padding: .34em .7em; border-radius: 999px;
    color: var(--muted); background: rgba(122,61,255,.1); border: 1px solid var(--border);
  }
  .badge .dotmark { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
  h1 { font-size: 19px; font-weight: 600; margin: 0 0 14px; line-height: 1.35; }
  p { color: var(--muted); font-size: 14.5px; margin: 0 0 14px; }
  a { color: var(--dig-purple-hover); font-weight: 600; }
  /* --muted, not --faint: --faint (#7e769b) on --surface (#16131f) is ~4.32:1, just under the
     4.5:1 WCAG AA floor for normal text at this size; --muted (#a99fc4) clears it at ~7.36:1
     (mirrors the .dig-sub / .mark .net contrast reasoning used across these templates). */
  .version-tag { font-size: 11px; color: var(--muted); margin: 18px 0 0; }
</style>
</head>
<body>
  <main class="card">
    <p class="mark">DIG<span class="net">&nbsp;Network</span></p>
    <span class="badge"><span class="dotmark"></span>Unavailable</span>
    <h1>This address is temporarily unavailable</h1>
    <p>Please try again in a moment. If the problem persists, the domain may not be configured
    correctly.</p>
    <p><a href="https://hub.dig.net">Go to the DIG Network &rarr;</a></p>
    <p class="version-tag" data-testid="footer-app-version">v%%APP_VERSION%%</p>
  </main>
</body>
</html>
